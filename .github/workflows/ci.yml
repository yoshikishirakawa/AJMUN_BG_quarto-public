name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.lock
          python -m pip install --no-deps -e api

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui-next/package-lock.json

      - name: Install root Node dependencies
        run: npm ci

      - name: Install UI Node dependencies
        run: npm --prefix ui-next ci

      - name: Audit root Node dependencies
        run: npm audit --audit-level=moderate

      - name: Audit UI Node dependencies
        run: npm --prefix ui-next audit --audit-level=moderate

      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit
          pip-audit -r api/requirements.lock

      - name: Run Python tests
        run: PYTHONPATH=. pytest -q

      - name: Build reader UI bundle
        run: npm run build:reader-ui

      - name: Lint React UI
        run: npm --prefix ui-next run lint

      - name: Run React UI tests
        run: npm --prefix ui-next run test:run

      - name: Build React UI
        run: npm --prefix ui-next run build

      - name: Run release checks
        run: bash scripts/release_check.sh

      - name: Validate Docker compose config
        run: docker compose config

      - name: Validate production Docker compose config
        run: |
          if docker compose -f docker-compose.prod.yml --env-file .env.prod.example config > /tmp/prod-compose.log 2>&1; then
            echo ".env.prod.example unexpectedly expanded as runnable production config"
            exit 1
          fi
          grep -E 'required variable (SESSION_SECRET|ADMIN_SECRET) is missing a value' /tmp/prod-compose.log
